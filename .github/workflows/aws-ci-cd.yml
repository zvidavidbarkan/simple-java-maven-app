name: Java CI/CD Pipeline

on:
  push:
    branches: [ "AWS-Infrastructure" ]

jobs:
  build_and_version:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: '17.0.9+9'
          distribution: 'temurin'
          cache: 'maven'

      - name: Calculate and Export Version
        run: |
          PATCH_VERSION="$((GITHUB_RUN_NUMBER-1))"
          NEW_VERSION="1.0.${PATCH_VERSION}"
          echo "New Version: ${NEW_VERSION}"
          echo "APP_VERSION=${NEW_VERSION}" >> "$GITHUB_ENV"
      - name: Update Maven Project Version
        run: |
          mvn versions:set -DnewVersion="${APP_VERSION}" -DgenerateBackupPoms=false
          mvn help:evaluate -Dexpression=project.version -q -DforceStdout
      - name: Login to DockerHub
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          IMAGE_REF="${{ secrets.DOCKERHUB_USERNAME }}/simple-java-maven-app:${APP_VERSION}"
          IMAGE_LATEST="${{ secrets.DOCKERHUB_USERNAME }}/simple-java-maven-app:latest }}"

          docker build -t "${IMAGE_REF}" -t "${IMAGE_LATEST}" .
          
          docker push "${IMAGE_REF}"
          docker push "${IMAGE_LATEST}"


