name: Java CI/CD Pipeline.

on:
  push:
    branches: [ "AWS-Infrastructure" ]

jobs:
  build_and_version:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up JDK 17
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: '17.0.9+9'
          distribution: 'temurin'
          cache: 'maven'
      
      - name: Calculate and Export Version
        run: |
          PATCH_VERSION="$((GITHUB_RUN_NUMBER-1))"
          NEW_VERSION="1.0.${PATCH_VERSION}"
          echo "New Version: ${NEW_VERSION}"
          echo "APP_VERSION=${NEW_VERSION}" >> "$GITHUB_ENV"
      - name: Update Maven Project Version
        run: |
          mvn versions:set -DnewVersion="${APP_VERSION}" -DgenerateBackupPoms=false
          mvn help:evaluate -Dexpression=project.version -q -DforceStdout
      
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7
        with: 
          aws-region: eu-central-1 

      - name: Login to AWS-ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896

      - name: Build Docker Image
        env: 
          REGISTRY: ${{ steps.login-ecr.outputs.registry}}
          REPOSITORY: simple-java-maven-app
          IMAGE_TAG: ${{ env.APP_VERSION }}
        
        run: |
          IMAGE_URI="${REGISTRY}/${REPOSITORY}:${IMAGE_TAG}"

          docker build -t "${IMAGE_URI}" .
          
          docker push "${IMAGE_URI}"


